# Prometheus Configuration for go-zero-shop
# 监控所有微服务和中间件

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'go-zero-shop'
    env: 'local'

# Alertmanager 配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# 告警规则文件
rule_files:
  - /etc/prometheus/rules/*.yml

# 抓取配置
scrape_configs:
  # ==================== API Gateway 监控 ====================
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8888']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):\d+'
        replacement: '${1}'

  # ==================== Order RPC 监控 ====================
  - job_name: 'order-rpc'
    static_configs:
      - targets: ['order-rpc:9002']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):\d+'

  # ==================== Product RPC 监控 ====================
  - job_name: 'product-rpc'
    static_configs:
      - targets: ['product-rpc:9001']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):\d+'

  # ==================== User RPC 监控 ====================
  - job_name: 'user-rpc'
    static_configs:
      - targets: ['user-rpc:9000']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):\d+'

  # ==================== Search RPC 监控 ====================
  - job_name: 'search-rpc'
    static_configs:
      - targets: ['search-rpc:9006']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):\d+'

  # ==================== Cart RPC 监控 ====================
  - job_name: 'cart-rpc'
    static_configs:
      - targets: ['cart-rpc:9004']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):\d+'

  # ==================== Pay RPC 监控 ====================
  - job_name: 'pay-rpc'
    static_configs:
      - targets: ['pay-rpc:9005']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):\d+'

  # ==================== Seckill RPC 监控 ====================
  - job_name: 'seckill-rpc'
    static_configs:
      - targets: ['seckill-rpc:9003']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):\d+'

  # ==================== Reply RPC 监控 ====================
  - job_name: 'reply-rpc'
    static_configs:
      - targets: ['reply-rpc:9008']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):\d+'

  # ==================== DTM 监控 ====================
  - job_name: 'dtm'
    static_configs:
      - targets: ['dtm:36789']
    metrics_path: '/api/metrics'

  # ==================== MQ 消费者监控 ====================
  # 注意: docker-compose 中所有消费者共享 order-rmq 容器，需在各消费者暴露独立 metrics 端口后启用
  # - job_name: 'order-consumer'
  #   static_configs:
  #     - targets: ['order-rmq:8080']

  # ==================== 基础设施监控 (需要 exporter，仅 K8s 环境可用) ====================
  # 以下 exporter 在 docker-compose 开发环境中不可用，仅保留占位注释
  # - job_name: 'redis'          → 需要 redis-exporter
  # - job_name: 'mysql'          → 需要 mysqld-exporter
  # - job_name: 'rabbitmq'       → 需要 rabbitmq-exporter
  # - job_name: 'elasticsearch'  → 需要 elasticsearch-exporter
  # - job_name: 'node'           → 需要 node-exporter
