# Grafana Dashboard Provisioning
# 自动加载仪表盘配置

apiVersion: 1

providers:
  # 仪表盘提供商
  - name: 'go-zero-shop Dashboards'
    orgId: 1
    folder: 'go-zero-shop'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
