Name: user.rpc
ListenOn: 0.0.0.0:8080
Etcd:
  Hosts:
  - 127.0.0.1:2379
  Key: user.rpc

Mysql:
  DataSource: root:@tcp(127.0.0.1:3306)/user?charset=utf8mb4&parseTime=true&loc=Local

CacheRedis:
  - Host: 127.0.0.1:6379
    Pass:
    Type: node

BizRedis:
  Host: 127.0.0.1:6379
  Pass: ""
  DB: 0

Salt: "go-zero-user-salt"
Snowflake:
  NodeID: 1 # 集群中每个节点需不同（如节点1=1，节点2=2，...，最多1024个节点）
  
Telemetry:
  Name: user-rpc
  Endpoint: http://jaeger:14268/api/traces
  Sampler: 1.0  # 采样率，1.0表示100%采样
  Batcher: jaeger