Name: user.rpc
ListenOn: 0.0.0.0:8080
Etcd:
  Hosts:
  - etcd:2379
  Key: user.rpc

Mysql:
  DataSource: root:123456@tcp(mysql:3306)/user?charset=utf8mb4&parseTime=true&loc=Local

CacheRedis:
  - Host: redis:6379
    Pass: ""
    Type: node

BizRedis:
  Host: redis:6379
  Pass: ""
  DB: 0

Salt: "go-zero-user-salt"
Snowflake:
  NodeID: 1

Telemetry:
  Name: user-rpc
  Endpoint: http://jaeger:14268/api/traces
  Sampler: 1.0
  Batcher: jaeger
