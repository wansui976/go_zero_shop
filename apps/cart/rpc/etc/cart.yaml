Name: cart.rpc
ListenOn: 0.0.0.0:8084

Etcd:
  Hosts:
  - etcd:2379
  Key: cart.rpc

DataSource: root:123456@tcp(mysql:3306)/cart?charset=utf8mb4&parseTime=true&loc=Local

CacheRedis:
  - Host: redis:6379
    Pass: ""
    Type: node

Telemetry:
  Name: cart-rpc
  Endpoint: http://jaeger:14268/api/traces
  Sampler: 1.0
  Batcher: jaeger
