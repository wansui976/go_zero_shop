syntax = "proto3";

package search;
option go_package = "./search";
message ProductData {
  // ===== 基本信息 =====
  int64 id = 1;                // 商品ID (SPU)
  string name = 2;             // 商品名称
  string brief = 3;            // 简介
  string keywords = 4;         // 关键词，用于搜索
  string image_url = 5;        // 主图URL

  // ===== 分类与品牌 =====
  int64 category_id = 6;       // 主分类ID
  string category_name = 7;    // 主分类名称
  string category_ids = 8;     // 所有分类ID集合（逗号分隔）
  int64 brand_id = 9;          // 品牌ID
  string brand_name = 10;      // 品牌名称

  // ===== 价格与库存 =====
  double price = 11;           // 售价
  int64 stock = 12;            // 当前库存
  int32 low_stock = 13;        // 库存预警值
  int32 sales = 14;            // 销量

  // ===== 物理属性 =====
  string unit = 15;            // 单位（件 / 台 / 箱）
  float weight = 16;           // 重量(kg)

  // ===== 内容描述 =====
  string detail_title = 17;    // 详情标题
  string detail_desc = 18;     // 详情描述
  string detail_html = 19;     // 富文本详情内容（HTML）

  // ===== 状态与控制 =====
  int32 sort = 20;             // 排序值
  int32 new_status_sort = 21;  // 新品排序
  int32 recommend_status_sort = 22; // 推荐排序
  int64 status = 23;           // 商品状态：0-下架，1-上架
  int64 create_time = 24;      // 创建时间（时间戳）
  int64 update_time = 25;      // 更新时间（时间戳）
}


message CreateReq {
}

message CreateResp {
}


message DeleteReq {
  repeated int64 ids = 1;
}

message DeleteResp {
}


message SearchSimpleReq {
  string keyword = 1; //关键字
  int64 page_num = 2; //页码
  int64 page_size = 3; //每页数量
}

message SearchReq {
  string keyword = 1; //关键字
  int64 page_num = 2; //页码
  int64 page_size = 3; //每页数量
  int32 sort = 4; //排序字段:0->按相关度；1->按新品；2->按销量；3->价格从低到高；4->价格从高到低

  // ===== 过滤条件 =====
  repeated int64 category_ids = 5; //分类ID列表（多选）
  repeated int64 brand_ids = 6; //品牌ID列表（多选）
  double price_min = 7; //最低价格
  double price_max = 8; //最高价格
  bool has_stock = 9; //是否有库存
  int64 status = 10; //商品状态（1-上架，0-下架，默认1）

  // ===== 聚合查询 =====
  bool need_agg = 11; //是否需要聚合数据（默认false，减少不必要计算）
}


message SearchResp {
  repeated ProductData data = 1; //商品列表
  int64 total = 2; //总数

  // ===== 聚合数据 =====
  repeated BrandAgg brand_aggs = 3; //品牌聚合
  repeated CategoryAgg category_aggs = 4; //分类聚合
  repeated PriceRangeAgg price_range_aggs = 5; //价格区间聚合
}

// 品牌聚合
message BrandAgg {
  int64 brand_id = 1;
  string brand_name = 2;
  int64 count = 3; //该品牌下的商品数量
}

// 分类聚合
message CategoryAgg {
  int64 category_id = 1;
  string category_name = 2;
  int64 count = 3; //该分类下的商品数量
}

// 价格区间聚合
message PriceRangeAgg {
  string range_key = 1; //区间标识，如 "0-100", "100-500", "500+"
  string range_label = 2; //区间显示标签，如 "0-100元", "100-500元", "500元以上"
  int64 count = 3; //该区间内的商品数量
}

message RecommendReq {
  string keyword = 1; //关键字
  int64 page_num = 2; //页码
  int64 page_size = 3; //每页数量
  string sort = 4; //排序
  int64 category_id = 5; //商品分类ID
  int64 brand_id = 6; //品牌ID
}


message RecommendResp {
  repeated ProductData data = 1; //商品列表
}
message SearchRelatedReq {
  string keyword = 1; //关键字
}


message SearchRelatedResp {
  repeated string brand_names = 1;//品牌名称集合
  repeated string category_names = 2; //分类名称集合
  repeated ProductAttr productAttrs = 3; //属性集合
}
message ProductAttr {
  int64 attrId = 1; //属性id
  string attrName = 2; //属性名称
  repeated string attrValues = 3; //属性值
}

//搜索服务
service Search {

  //创建商品
  rpc create(CreateReq) returns(CreateResp);

  //根据id集合删除商品
  rpc delete(DeleteReq) returns(DeleteResp);

  //简单搜索-根据关键字通过名称或副标题查询商品
  rpc searchSimple(SearchSimpleReq) returns(SearchResp);

  //综合搜索、筛选、排序-根据关键字通过名称或副标题复合查询商品
  rpc search(SearchReq) returns(SearchResp);

  //根据商品id推荐商品
  rpc recommend(RecommendReq) returns(SearchResp);

  //获取搜索的相关品牌、分类及筛选属性
  rpc searchRelated(SearchRelatedReq) returns(SearchRelatedResp);
}

//goctl rpc protoc search.proto --go_out=. --go-grpc_out=. --zrpc_out=.