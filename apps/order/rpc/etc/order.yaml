Name: order.rpc
ListenOn: 0.0.0.0:8082

Etcd:
  Hosts:
  - etcd:2379
  Key: order.rpc
  Mode: dev

UserRpc:
  Etcd:
    Hosts:
      - etcd:2379
    Key: user.rpc

ProductRpc:
  Etcd:
    Hosts:
      - etcd:2379
    Key: product.rpc

PayRpc:
  Etcd:
    Hosts:
      - etcd:2379
    Key: pay.rpc

DataSource: root:123456@tcp(mysql:3306)/orders?charset=utf8mb4&parseTime=true&loc=Local

CacheRedis:
  - Host: redis:6379
    Pass: ""
    Type: node
BizRedis:
  Host: redis:6379
  Pass: ""
  Type: node

Snowflake:
  NodeID: 1

BarrierDB:
  DataSource: root:123456@tcp(mysql:3306)/dtm_barrier?charset=utf8mb4&parseTime=true&loc=Local

KafkaConsumer:
  Name: order-consumer
  Brokers:
    - "kafka:9092"
  Group: "order-group"
  Topic: "order-created"
  Offset: last
  Consumers: 8
  Processors: 8

RabbitMQurl: "amqp://admin:admin123456@rabbitmq:5672/"

Telemetry:
  Name: order-rpc
  Endpoint: http://jaeger:14268/api/traces
  Sampler: 1.0
  Batcher: jaeger
