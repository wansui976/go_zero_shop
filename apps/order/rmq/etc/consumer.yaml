Name: order-consumer
Mode: dev

RabbitMQ:
  Url: amqp://admin:admin123456@rabbitmq:5672/
  PoolSize: 10

Redis:
  Host: redis:6379
  Type: node
  Pass: ""

Log:
  ServiceName: order-consumer
  Mode: file
  Path: logs
  Level: info
  Compress: false
  KeepDays: 7
  StackCooldownMillis: 100

Prometheus:
  Host: 0.0.0.0
  Port: 9091
  Path: /metrics

Consumer:
  Workers: 10
  PrefetchCount: 10
  RetryMax: 3
  RetryInterval: 60

Queues:
  - Name: order_create_queue
    Durable: true
    AutoDelete: false
    Exclusive: false
  - Name: order_delay_queue
    Durable: true
    AutoDelete: false
    Exclusive: false
    Args:
      x-dead-letter-exchange: dlx.exchange
      x-dead-letter-routing-key: order.cancel
      x-message-ttl: 1800000
  - Name: stock_change_queue
    Durable: true
    AutoDelete: false
    Exclusive: false
