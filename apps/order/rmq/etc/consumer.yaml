Name: order-consumer
Mode: dev

RabbitMQ:
  Url: amqp://guest:guest@localhost:5672/
  PoolSize: 10

Redis:
  Host: localhost:6379
  Type: node
  Pass:

Log:
  ServiceName: order-consumer
  Mode: file
  Path: logs
  Level: info
  Compress: false
  KeepDays: 7
  StackCooldownMillis: 100

Prometheus:
  Host: 0.0.0.0
  Port: 9091
  Path: /metrics

Consumer:
  Workers: 10              # 并发消费数
  PrefetchCount: 10        # 预取消息数
  RetryMax: 3              # 最大重试次数
  RetryInterval: 60        # 重试间隔(秒)

# 队列配置
Queues:
  - Name: order_create_queue
    Durable: true
    AutoDelete: false
    Exclusive: false
    
  - Name: order_delay_queue
    Durable: true
    AutoDelete: false
    Exclusive: false
    Args:
      x-dead-letter-exchange: dlx.exchange
      x-dead-letter-routing-key: order.cancel
      x-message-ttl: 1800000  # 30分钟
      
  - Name: stock_change_queue
    Durable: true
    AutoDelete: false
    Exclusive: false
