syntax = "proto3";

package reply;
option go_package="./reply";

service Reply {
  rpc CreateComment(CreateCommentRequest) returns(CreateCommentResponse);
  rpc DeleteComment(DeleteCommentRequest) returns(DeleteCommentResponse);
  rpc UpdateComment(UpdateCommentRequest) returns(UpdateCommentResponse);
  rpc Comments(CommentsRequest) returns(CommentsResponse);
}

message CreateCommentRequest {
  string business = 1;
  int64 target_id = 2;
  int64 reply_user_id = 3;
  int64 be_reply_user_id = 4;
  int64 parent_id = 5;
  string content = 6;
  string image = 7;
}

message CreateCommentResponse {
  int64 id = 1;
}

message DeleteCommentRequest {
  int64 id = 1;
}

message DeleteCommentResponse {}

message UpdateCommentRequest {
  int64 id = 1;
  string content = 2;
  string image = 3;
}

message UpdateCommentResponse {}

message CommentsRequest {
  string business = 1;
  int64 target_id = 2;
  int64 cursor = 3;
  int32 ps = 4;
}

message CommentsResponse {
  repeated CommentItem comments = 1;
  bool is_end = 2;
  int64 last_cursor = 3;
  int64 total = 4;
}

message CommentItem {
  int64 id = 1;
  string business = 2;
  int64 target_id = 3;
  int64 reply_user_id = 4;
  int64 be_reply_user_id = 5;
  int64 parent_id = 6;
  string content = 7;
  string image = 8;
  int64 create_time = 9;
  int64 update_time = 10;
}
