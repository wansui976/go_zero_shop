syntax = "proto3";

package product;
option go_package = "./product";

service Product {
  rpc Product(ProductItemRequest) returns (ProductItem) ;
  rpc Products(ProductRequest) returns(ProductResponse);
  rpc ProductList(ProductListRequest) returns(ProductListResponse);
  rpc ProductAllList(ProductAllListRequest) returns(ProductAllListResponse);
  rpc OperationProducts(OperationProductsRequest) returns (OperationProductsResponse);
  rpc UpdateProductStock(UpdateProductStockRequest) returns (UpdateProductStockResponse);
  rpc CheckAndUpdateStock(CheckAndUpdateStockRequest) returns (CheckAndUpdateStockResponse);
  rpc CheckProductStock(UpdateProductStockRequest) returns (UpdateProductStockResponse);
  rpc RollbackProductStock(UpdateProductStockRequest) returns (UpdateProductStockResponse);
  rpc DecrStock(DecrStockRequest) returns(DecrStockResponse);
  rpc DecrStockRevert(DecrStockRequest) returns(DecrStockResponse);
}

message ProductItemRequest{
    int64 product_id = 1;
}

message ProductRequest{
    string product_ids = 1;
}

message ProductResponse{
    map<int64,ProductItem> products = 1;
}

message ProductListRequest{
    int32 category_id = 1;
    int64 cursor = 2;
    int32 ps = 3;
    int64 product_id = 4;
}

message ProductListResponse{
    bool is_end = 1;
    int64 timestamp = 2;
    int64 product_id = 3;
    repeated ProductItem products = 4;
}

message ProductAllListRequest{
}

message ProductAllListResponse{
    repeated ProductItem products = 4;
}

message OperationProductsRequest{
}

message OperationProductsResponse{
    repeated ProductItem products = 1;
}
// 商品项（SPU）

message DecrProduct{
  int64 id = 1;
  int64 num = 2;
}

message ProductItem {
  // ===== 基本信息 =====
  int64 id = 1;                // 商品ID (SPU)
  string name = 2;             // 商品名称
  string brief = 3;            // 简介
  string keywords = 4;         // 关键词，用于搜索
  string image_url = 5;        // 主图URL

  // ===== 分类与品牌 =====
  int64 category_id = 6;       // 主分类ID
  string category_name = 7;    // 主分类名称
  string category_id_list = 8; // 所有分类ID集合（逗号分隔，如“1,2,3”）
  int64 brand_id = 9;          // 品牌ID
  string brand_name = 10;      // 品牌名称

  // ===== 价格与库存 =====
  int64 price = 11;           // 售价（元）
  int64 stock = 12;            // 当前库存数量
  int32 low_stock = 13;        // 库存预警值（低于此值提示补货）
  int32 sales = 14;            // 累计销量

  // ===== 物理属性 =====
  string unit = 15;            // 销售单位（件 / 台 / 箱）
  float weight = 16;           // 商品重量（kg）

  // ===== 内容描述 =====
  string detail_title = 17;    // 详情页标题
  string detail_desc = 18;     // 详情页简洁描述
  string detail_html = 19;     // 富文本详情内容（HTML格式）

  // ===== 状态与控制 =====
  int32 sort = 20;             // 全局排序值（值越大越靠前）
  int32 new_status_sort = 21;  // 新品排序值（值越大越新，越靠前）
  int32 recommend_status_sort = 22; // 推荐排序值（值越大推荐优先级越高）
  ProductStatus status = 23;   // 商品状态
  int64 create_time = 24;      // 创建时间（时间戳，毫秒级）
  int64 update_time = 25;      // 更新时间（时间戳，毫秒级）
}

// 商品状态枚举
enum ProductStatus {
  PRODUCT_STATUS_UNKNOWN = 0;  // 未知状态（默认值）
  PRODUCT_STATUS_OFFLINE = 1;  // 下架
  PRODUCT_STATUS_ONLINE = 2;   // 上架
}

