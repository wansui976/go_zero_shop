Name: api-api
Host: 0.0.0.0
Port: 8888
JwtAuth:
  AccessSecret: "your-secret-key-here-please-change-in-production"
  AccessExpire: 604800  # 7 days
OrderRPC:
  Endpoints:
    - 127.0.0.1:8082
ProductRPC:
  Endpoints:
    - 127.0.0.1:8081

UserRPC:
  Endpoints:
    - 127.0.0.1:8080

SearchRPC:
  Endpoints:
    - 127.0.0.1:8083

CartRPC:
  Endpoints:
    - 127.0.0.1:8084

BizRedis:
  Host: 127.0.0.1:6379
  Pass: ""
  Type: node

DTMServer: "127.0.0.1:36790" # DTM服务的gRPC地址

# DTM Saga 回调地址（DTM server 主动调用各 RPC 服务时使用，需与服务 ListenOn 一致）
OrderServiceAddr: "127.0.0.1:8082"
ProductServiceAddr: "127.0.0.1:8081"