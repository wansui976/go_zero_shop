apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-rpc
  namespace: go-zero-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-rpc
  template:
    metadata:
      labels:
        app: user-rpc
    spec:
      initContainers:
      - name: wait-for-deps
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z mysql 3306 && nc -z redis 6379 && nc -z etcd 2379; do echo waiting for mysql/redis/etcd; sleep 2; done']
      containers:
      - name: user-rpc
        image: go-zero-shop/user-rpc:latest
        imagePullPolicy: IfNotPresent
        command: ["/app/app-binary", "-f", "/app/etc/user.yaml"]
        ports:
        - containerPort: 9101
          name: metrics
        - containerPort: 8080
          name: grpc
        volumeMounts:
        - name: config
          mountPath: /app/etc
          readOnly: true
        startupProbe:
          grpc:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
        readinessProbe:
          grpc:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        livenessProbe:
          grpc:
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 6
      volumes:
      - name: config
        configMap:
          name: user-rpc-config
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "9101"
  name: user-rpc
  namespace: go-zero-shop
spec:
  selector:
    app: user-rpc
  ports:
  - port: 8080
    targetPort: 8080
    name: grpc
  - port: 9101
    targetPort: 9101
    name: metrics
  type: ClusterIP
