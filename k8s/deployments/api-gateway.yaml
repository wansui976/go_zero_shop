apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: go-zero-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      initContainers:
      - name: wait-for-user-rpc
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z user-rpc 8080; do echo waiting for user-rpc; sleep 2; done']
      - name: wait-for-product-rpc
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z product-rpc 8081; do echo waiting for product-rpc; sleep 2; done']
      - name: wait-for-order-rpc
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z order-rpc 8082; do echo waiting for order-rpc; sleep 2; done']
      - name: wait-for-reply-rpc
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z reply-rpc 8086; do echo waiting for reply-rpc; sleep 2; done']
      - name: wait-for-search-rpc
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z search-rpc 8083; do echo waiting for search-rpc; sleep 2; done']
      - name: wait-for-cart-rpc
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z cart-rpc 8084; do echo waiting for cart-rpc; sleep 2; done']
      - name: wait-for-pay-rpc
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z pay-rpc 8085; do echo waiting for pay-rpc; sleep 2; done']
      - name: wait-for-dtm
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z dtm 36790; do echo waiting for dtm; sleep 2; done']
      containers:
      - name: api-gateway
        image: go-zero-shop/api-gateway:latest
        imagePullPolicy: IfNotPresent
        command: ["/app/app-binary", "-f", "/app/etc/api-api.yaml"]
        ports:
        - containerPort: 9101
          name: metrics
        - containerPort: 8888
          name: http
        volumeMounts:
        - name: config
          mountPath: /app/etc
          readOnly: true
        startupProbe:
          exec:
            command:
            - sh
            - -c
            - wget -q -T 2 -O - http://127.0.0.1:9101/metrics >/dev/null && nc -z 127.0.0.1 8888
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - wget -q -T 2 -O - http://127.0.0.1:9101/metrics >/dev/null && nc -z 127.0.0.1 8888
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - wget -q -T 2 -O - http://127.0.0.1:9101/metrics >/dev/null && nc -z 127.0.0.1 8888
          initialDelaySeconds: 45
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 6
      volumes:
      - name: config
        configMap:
          name: api-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "9101"
  name: api-gateway
  namespace: go-zero-shop
spec:
  selector:
    app: api-gateway
  ports:
  - port: 8888
    targetPort: 8888
    name: http
  - port: 9101
    targetPort: 9101
    name: metrics
  type: ClusterIP
