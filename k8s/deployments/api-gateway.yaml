# API Gateway 服务部署
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: go-zero-shop
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: go-zero-shop/api-gateway:latest
        ports:
        - containerPort: 8888
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        volumeMounts:
        - name: config
          mountPath: /app/etc
          readOnly: true
        livenessProbe:
          httpGet:
            path: /ping
            port: 8888
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ping
            port: 8888
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: config
        configMap:
          name: api-gateway-config
      initContainers:
      - name: wait-for-user-rpc
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z user-rpc 8080; do echo waiting for user-rpc; sleep 2; done;']
      - name: wait-for-product-rpc
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z product-rpc 8081; do echo waiting for product-rpc; sleep 2; done;']
      - name: wait-for-order-rpc
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z order-rpc 8082; do echo waiting for order-rpc; sleep 2; done;']
      - name: wait-for-reply-rpc
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z reply-rpc 8083; do echo waiting for reply-rpc; sleep 2; done;']
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: go-zero-shop
spec:
  selector:
    app: api-gateway
  ports:
  - port: 8888
    targetPort: 8888
  type: LoadBalancer