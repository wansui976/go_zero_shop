# /tmp/go_zero_shop_extracted/go_zero_shop/deploy/kubernetes/base/product-rpc.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-rpc
  namespace: go-zero-shop
  labels:
    app: product-rpc
    tier: backend
    service-type: rpc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-rpc
  template:
    metadata:
      labels:
        app: product-rpc
        tier: backend
        service-type: rpc
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
    spec:
      serviceAccountName: shop-service-account
      containers:
        - name: product-rpc
          image: go-zero-shop/product-rpc:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9001
              name: grpc
            - containerPort: 9091
              name: metrics
          envFrom:
            - configMapRef:
                name: shop-config
            - secretRef:
                name: shop-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            grpc:
              port: 9001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            grpc:
              port: 9001
            initialDelaySeconds: 30
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: product-rpc-service
  namespace: go-zero-shop
spec:
  type: ClusterIP
  ports:
    - port: 9001
      targetPort: 9001
      name: grpc
  selector:
    app: product-rpc

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: product-rpc-hpa
  namespace: go-zero-shop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: product-rpc
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70