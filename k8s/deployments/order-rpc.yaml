# /tmp/go_zero_shop_extracted/go_zero_shop/deploy/kubernetes/base/order-rpc.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-rpc
  namespace: go-zero-shop
  labels:
    app: order-rpc
    tier: backend
    service-type: rpc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-rpc
  template:
    metadata:
      labels:
        app: order-rpc
        tier: backend
        service-type: rpc
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
    spec:
      serviceAccountName: shop-service-account
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36
          command: ['sh', '-c', 
            'until nc -z user-rpc-service 9000 && nc -z product-rpc-service 9001; do echo waiting for dependencies; sleep 2; done;']
      containers:
        - name: order-rpc
          image: go-zero-shop/order-rpc:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9002
              name: grpc
            - containerPort: 9091
              name: metrics
          envFrom:
            - configMapRef:
                name: shop-config
            - secretRef:
                name: shop-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            grpc:
              port: 9002
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            grpc:
              port: 9002
            initialDelaySeconds: 30
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: order-rpc-service
  namespace: go-zero-shop
spec:
  type: ClusterIP
  ports:
    - port: 9002
      targetPort: 9002
      name: grpc
  selector:
    app: order-rpc

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-rpc-hpa
  namespace: go-zero-shop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-rpc
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70