apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysqld-exporter
  namespace: go-zero-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysqld-exporter
  template:
    metadata:
      labels:
        app: mysqld-exporter
    spec:
      initContainers:
      - name: wait-for-mysql
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z mysql 3306; do echo waiting for mysql; sleep 2; done']
      containers:
      - name: mysqld-exporter
        image: prom/mysqld-exporter:v0.16.0
        imagePullPolicy: IfNotPresent
        args:
        - --mysqld.address=mysql:3306
        - --mysqld.username=root
        env:
        - name: MYSQLD_EXPORTER_PASSWORD
          value: "123456"
        ports:
        - containerPort: 9104
          name: metrics
        startupProbe:
          httpGet:
            path: /metrics
            port: 9104
          periodSeconds: 5
          failureThreshold: 30
        readinessProbe:
          httpGet:
            path: /metrics
            port: 9104
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /metrics
            port: 9104
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: mysqld-exporter
  namespace: go-zero-shop
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "9104"
spec:
  selector:
    app: mysqld-exporter
  ports:
  - port: 9104
    targetPort: 9104
    name: metrics
  type: ClusterIP
