apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: go-zero-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
    spec:
      initContainers:
      - name: wait-for-redis
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z redis 6379; do echo waiting for redis; sleep 2; done']
      containers:
      - name: redis-exporter
        image: oliver006/redis_exporter:v1.67.0
        imagePullPolicy: IfNotPresent
        args:
        - --redis.addr=redis://redis:6379
        ports:
        - containerPort: 9121
          name: metrics
        startupProbe:
          httpGet:
            path: /metrics
            port: 9121
          periodSeconds: 5
          failureThreshold: 30
        readinessProbe:
          httpGet:
            path: /metrics
            port: 9121
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /metrics
            port: 9121
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: go-zero-shop
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "9121"
spec:
  selector:
    app: redis-exporter
  ports:
  - port: 9121
    targetPort: 9121
    name: metrics
  type: ClusterIP
