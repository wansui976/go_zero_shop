apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: go-zero-shop
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: go-zero-shop
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: go-zero-shop
        orgId: 1
        folder: Go Zero Shop
        type: file
        disableDeletion: false
        editable: true
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
---
