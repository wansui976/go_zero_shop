apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq-exporter
  namespace: go-zero-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq-exporter
  template:
    metadata:
      labels:
        app: rabbitmq-exporter
    spec:
      initContainers:
      - name: wait-for-rabbitmq
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z rabbitmq 15672; do echo waiting for rabbitmq; sleep 2; done']
      containers:
      - name: rabbitmq-exporter
        image: kbudde/rabbitmq-exporter:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: RABBIT_URL
          value: http://rabbitmq:15672
        - name: RABBIT_USER
          value: admin
        - name: RABBIT_PASSWORD
          value: admin123456
        - name: PUBLISH_PORT
          value: "9419"
        ports:
        - containerPort: 9419
          name: metrics
        startupProbe:
          httpGet:
            path: /metrics
            port: 9419
          periodSeconds: 5
          failureThreshold: 30
        readinessProbe:
          httpGet:
            path: /metrics
            port: 9419
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /metrics
            port: 9419
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-exporter
  namespace: go-zero-shop
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "9419"
spec:
  selector:
    app: rabbitmq-exporter
  ports:
  - port: 9419
    targetPort: 9419
    name: metrics
  type: ClusterIP
