apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: go-zero-shop
spec:
  progressDeadlineSeconds: 1800
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      initContainers:
      - name: wait-for-elasticsearch
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z elasticsearch 9200; do echo waiting for elasticsearch; sleep 2; done']
      containers:
      - name: kibana
        image: docker.elastic.co/kibana/kibana:8.15.3
        imagePullPolicy: IfNotPresent
        env:
        - name: ELASTICSEARCH_HOSTS
          value: http://elasticsearch:9200
        - name: ELASTICSEARCH_REQUESTTIMEOUT
          value: "300000"
        - name: ELASTICSEARCH_SHARDTIMEOUT
          value: "300000"
        - name: SERVER_PUBLICBASEURL
          value: http://127.0.0.1:5601
        - name: XPACK_SECURITY_ENABLED
          value: 'false'
        - name: NODE_OPTIONS
          value: --max-old-space-size=768
        ports:
        - containerPort: 5601
          name: http
        startupProbe:
          httpGet:
            path: /api/status
            port: 5601
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 90
        readinessProbe:
          httpGet:
            path: /api/status
            port: 5601
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /api/status
            port: 5601
          initialDelaySeconds: 300
          periodSeconds: 20
          timeoutSeconds: 5
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: go-zero-shop
spec:
  selector:
    app: kibana
  ports:
  - port: 5601
    targetPort: 5601
    name: http
  type: ClusterIP
