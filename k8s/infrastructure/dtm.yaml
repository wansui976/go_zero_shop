apiVersion: apps/v1
kind: Deployment
metadata:
  name: dtm
  namespace: go-zero-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dtm
  template:
    metadata:
      labels:
        app: dtm
    spec:
      initContainers:
      - name: wait-for-mysql
        image: mysql:8.4.8
        command: ['sh', '-c', 'until mysqladmin ping -hmysql -uroot -p123456 --silent; do echo waiting for mysql; sleep 2; done']
      - name: init-dtm-schema
        image: mysql:8.4.8
        command:
        - sh
        - -c
        - |
          for f in /sql/*.sql; do
            echo "importing $f";
            mysql -hmysql -uroot -p123456 < "$f";
          done
        volumeMounts:
        - name: dtm-init-sql
          mountPath: /sql
      containers:
      - name: dtm
        image: yedf/dtm:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: STORE_DRIVER
          value: mysql
        - name: STORE_HOST
          value: mysql
        - name: STORE_PORT
          value: "3306"
        - name: STORE_USER
          value: root
        - name: STORE_PASSWORD
          value: "123456"
        - name: STORE_DB
          value: dtm
        - name: MICRO_SERVICE_DRIVER
          value: dtm-driver-gozero
        - name: MICRO_SERVICE_TARGET
          value: etcd://etcd:2379/dtmservice
        - name: MICRO_SERVICE_END_POINT
          value: dtm:36790
        - name: IS_DOCKER
          value: "1"
        ports:
        - containerPort: 36789
          name: http
        - containerPort: 36790
          name: grpc
        startupProbe:
          tcpSocket:
            port: 36790
          periodSeconds: 5
          failureThreshold: 30
        readinessProbe:
          tcpSocket:
            port: 36790
          periodSeconds: 5
        livenessProbe:
          tcpSocket:
            port: 36789
          periodSeconds: 10
      volumes:
      - name: dtm-init-sql
        configMap:
          name: dtm-init-sql
---
apiVersion: v1
kind: Service
metadata:
  name: dtm
  namespace: go-zero-shop
spec:
  selector:
    app: dtm
  ports:
  - name: http
    port: 36789
    targetPort: 36789
  - name: grpc
    port: 36790
    targetPort: 36790
  type: ClusterIP
