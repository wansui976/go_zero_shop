apiVersion: v1
kind: ConfigMap
metadata:
  name: reply-rpc-config
  namespace: go-zero-shop
data:
  reply.yaml: |
    Name: reply.rpc
    ListenOn: 0.0.0.0:8086
    Etcd:
      Hosts:
      - etcd:2379
      Key: reply.rpc

    DataSource: root:123456@tcp(mysql:3306)/reply?charset=utf8mb4&parseTime=true&loc=Local

    CacheRedis:
      - Host: redis:6379
        Pass: ""
        Type: node

    Snowflake:
      NodeID: 3

    Telemetry:
      Name: reply-rpc
      Endpoint: http://jaeger:14268/api/traces
      Sampler: 1.0
      Batcher: jaeger

    Prometheus:
      Host: 0.0.0.0
      Port: 9101
      Path: /metrics
