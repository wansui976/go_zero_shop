apiVersion: v1
kind: ConfigMap
metadata:
  name: search-rpc-config
  namespace: go-zero-shop
data:
  search.yaml: |
    Name: search.rpc
    ListenOn: 0.0.0.0:8083
    Etcd:
      Hosts:
      - etcd:2379
      Key: search.rpc

    Es:
      Host: http://elasticsearch:9200
      Username: ""
      Password: ""

    ProductRpc:
      Etcd:
        Hosts:
          - etcd:2379
        Key: product.rpc

    CacheRedis:
      Host: redis:6379
      Pass: ""
      Type: node

    Prometheus:
      Host: 0.0.0.0
      Port: 9101
      Path: /metrics

    Telemetry:
      Name: search-rpc
      Endpoint: http://jaeger:14268/api/traces
      Sampler: 1.0
      Batcher: jaeger
