# DTM 配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: dtm-config
  namespace: go-zero-shop
data:
  conf.yml: |
    # DTM 配置文件
    Store:
      Driver: mysql
      Host: mysql
      Port: 3306
      User: root
      Password: "123456"
      Database: dtm
    
    # 子事务屏障配置
    TransBranchOp:
      BarrierDB:
        Driver: mysql
        Host: mysql
        Port: 3306
        User: root
        Password: "123456"
        Database: dtm_barrier
    
    # 日志配置
    LogLevel: info
    
    # 服务端口
    HttpPort: 36789
    GrpcPort: 36790
    
    # Etcd配置（用于服务发现）
    Registry:
      Driver: etcd
      Hosts:
        - etcd:2379