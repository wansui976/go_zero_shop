# DTM 数据库初始化脚本
apiVersion: v1
kind: ConfigMap
metadata:
  name: dtm-init-sql
  namespace: go-zero-shop
data:
  01-dtm-schema.sql: |
    -- DTM 主数据库
    CREATE DATABASE IF NOT EXISTS dtm;
    
    USE dtm;
    
    -- 事务全局表
    CREATE TABLE IF NOT EXISTS dtm.GLOBAL (
      id bigint(22) NOT NULL AUTO_INCREMENT,
      gid varchar(128) NOT NULL COMMENT '全局事务ID',
      trans_type varchar(45) NOT NULL COMMENT '事务类型',
      status varchar(45) NOT NULL COMMENT '事务状态',
      query_prepared varchar(1024) DEFAULT NULL COMMENT '预备查询URL',
      protocol varchar(45) DEFAULT NULL COMMENT '协议',
      create_time datetime DEFAULT NULL,
      update_time datetime DEFAULT NULL,
      finish_time datetime DEFAULT NULL,
      rollback_time datetime DEFAULT NULL,
      options varchar(1024) DEFAULT NULL COMMENT '事务选项',
      ext_data varchar(1024) DEFAULT NULL COMMENT '扩展数据',
      custom_data varchar(1024) DEFAULT NULL COMMENT '自定义数据',
      next_cron_interval int(11) DEFAULT NULL COMMENT '下次定时任务间隔',
      next_cron_time datetime DEFAULT NULL COMMENT '下次定时任务时间',
      owner_dbid varchar(64) DEFAULT NULL COMMENT '所有者数据库ID',
      PRIMARY KEY (id),
      UNIQUE KEY gid (gid),
      KEY create_time (create_time),
      KEY update_time (update_time),
      KEY finish_time (finish_time)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
    
    -- 事务分支表
    CREATE TABLE IF NOT EXISTS dtm.BRANCH (
      id bigint(22) NOT NULL AUTO_INCREMENT,
      gid varchar(128) NOT NULL COMMENT '全局事务ID',
      branch_id varchar(128) NOT NULL COMMENT '分支ID',
      op varchar(45) NOT NULL COMMENT '操作类型',
      status varchar(45) NOT NULL COMMENT '分支状态',
      finish_time datetime DEFAULT NULL,
      rollback_time datetime DEFAULT NULL,
      create_time datetime DEFAULT NULL,
      update_time datetime DEFAULT NULL,
      PRIMARY KEY (id),
      UNIQUE KEY gid_branch (gid, branch_id),
      KEY create_time (create_time),
      KEY update_time (update_time),
      KEY finish_time (finish_time)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
    
  02-dtm-barrier-schema.sql: |
    -- DTM 子事务屏障数据库
    CREATE DATABASE IF NOT EXISTS dtm_barrier;
    
    USE dtm_barrier;
    
    -- 子事务屏障表
    CREATE TABLE IF NOT EXISTS dtm_barrier.barrier (
      id bigint(22) NOT NULL AUTO_INCREMENT,
      trans_type varchar(45) DEFAULT NULL,
      gid varchar(128) DEFAULT NULL,
      branch_id varchar(128) DEFAULT NULL,
      op varchar(45) DEFAULT NULL,
      barrier_id varchar(45) DEFAULT NULL,
      reason varchar(45) DEFAULT NULL,
      create_time datetime DEFAULT NULL,
      update_time datetime DEFAULT NULL,
      PRIMARY KEY (id),
      UNIQUE KEY gid (gid, branch_id, op, barrier_id),
      KEY create_time (create_time),
      KEY update_time (update_time)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;