apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: go-zero-shop
data:
  api-api.yaml: |
    Name: api-api
    Host: 0.0.0.0
    Port: 8888
    JwtAuth:
      AccessSecret: "your-secret-key-here-please-change-in-production"
      AccessExpire: 604800
    OrderRPC:
      Endpoints:
        - order-rpc:8082
    ProductRPC:
      Endpoints:
        - product-rpc:8081
    ReplyRPC:
      Endpoints:
        - reply-rpc:8086
    UserRPC:
      Endpoints:
        - user-rpc:8080
    SearchRPC:
      Endpoints:
        - search-rpc:8083
    CartRPC:
      Endpoints:
        - cart-rpc:8084
    PayRPC:
      Endpoints:
        - pay-rpc:8085
    BizRedis:
      Host: redis:6379
      Pass: ""
      Type: node
    DtmServer: "dtm:36790"

    Telemetry:
      Name: api-gateway
      Endpoint: http://jaeger:14268/api/traces
      Sampler: 1.0
      Batcher: jaeger

    Prometheus:
      Host: 0.0.0.0
      Port: 9101
      Path: /metrics
