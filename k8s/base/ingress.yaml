# /tmp/go_zero_shop_extracted/go_zero_shop/deploy/kubernetes/base/ingress.yaml

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shop-ingress
  namespace: go-zero-shop
  # 注解 (Annotations)：用于配置 Nginx Ingress Controller 的高级特性
  annotations:
    # 路径重写：将请求路径重定向到后端服务的根路径
    nginx.ingress.kubernetes.io/rewrite-target: /
    # 限制上传文件的大小为 50MB
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # 后端服务响应超时时间 (秒)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # 开启跨域资源共享 (CORS)，允许前端网页跨域请求
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, PUT, POST, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"
    # 安全与防护：限流配置
    # 限制每个 IP 每秒请求数为 100 (RPS)
    nginx.ingress.kubernetes.io/limit-rps: "100"
    # 限制单个 IP 的并发连接数为 50
    nginx.ingress.kubernetes.io/limit-connections: "50"
spec:
  # 指定使用的 Ingress 控制器类名
  ingressClassName: nginx
  rules:
    # 匹配访问域名
    - host: api.shop.local
      http:
        paths:
          # 所有 API 路由均转发到统一 API 网关
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
  # HTTPS 配置
  tls:
    - hosts:
        - api.shop.local
      # 证书存储在名为 shop-tls-secret 的 Secret 中
      secretName: shop-tls-secret