apiVersion: v1
kind: Secret
metadata:
  name: shop-secrets
  namespace: go-zero-shop
type: Opaque
stringData:
  # MySQL
  MYSQL_ROOT_PASSWORD: "root123456"
  MYSQL_USER: "shop"
  MYSQL_PASSWORD: "shop123456"
  
  # Redis
  REDIS_PASSWORD: "redis123456"
  
  # RabbitMQ
  RABBITMQ_USER: "admin"
  RABBITMQ_PASSWORD: "admin123456"
  
  # JWT Secret
  JWT_SECRET: "your-jwt-secret-key-here-change-in-production"