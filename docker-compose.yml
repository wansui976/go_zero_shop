services:
  # 统一禁用容器内代理，避免 etcd/gRPC 等内部流量被错误转发到宿主代理

  # ==================== 基础设施 ====================
  mysql:
    image: mysql:8.4.8
    container_name: shop-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: go_zero_shop
      TZ: Asia/Shanghai
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-sql:/docker-entrypoint-initdb.d
    networks:
      - shop-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.4.2-alpine
    container_name: shop-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - shop-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  etcd:
    image: quay.io/coreos/etcd:v3.5.15
    container_name: shop-etcd
    restart: unless-stopped
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      all_proxy: ""
      NO_PROXY: "localhost,127.0.0.1,mysql,redis,etcd,rabbitmq,jaeger,prometheus,grafana,user-rpc,product-rpc,order-rpc,cart-rpc,pay-rpc,reply-rpc,search-rpc,api-gateway"
      no_proxy: "localhost,127.0.0.1,mysql,redis,etcd,rabbitmq,jaeger,prometheus,grafana,user-rpc,product-rpc,order-rpc,cart-rpc,pay-rpc,reply-rpc,search-rpc,api-gateway"
    command:
      - /usr/local/bin/etcd
      - --name=etcd
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd:2380
      - --initial-cluster=etcd=http://etcd:2380
      - --initial-cluster-token=shop-etcd
      - --initial-cluster-state=new
    ports:
      - "12379:2379"
      - "12380:2380"
    volumes:
      - etcd_data:/etcd-data
    networks:
      - shop-network
    healthcheck:
      test: ["CMD", "/usr/local/bin/etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.2.4-management-alpine
    container_name: shop-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123456
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - shop-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  dtm:
    image: yedf/dtm:latest
    container_name: shop-dtm
    restart: unless-stopped
    environment:
      STORE_DRIVER: mysql
      STORE_HOST: mysql
      STORE_PORT: 3306
      STORE_USER: root
      STORE_PASSWORD: "123456"
      STORE_DB: dtm
      MICRO_SERVICE_DRIVER: dtm-driver-gozero
      MICRO_SERVICE_TARGET: etcd://etcd:2379/dtmservice
      MICRO_SERVICE_END_POINT: dtm:36790
      IS_DOCKER: "1"
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      all_proxy: ""
      NO_PROXY: "localhost,127.0.0.1,mysql,redis,etcd,rabbitmq,dtm,jaeger,prometheus,grafana,elasticsearch,user-rpc,product-rpc,order-rpc,cart-rpc,pay-rpc,reply-rpc,search-rpc,api-gateway"
      no_proxy: "localhost,127.0.0.1,mysql,redis,etcd,rabbitmq,dtm,jaeger,prometheus,grafana,elasticsearch,user-rpc,product-rpc,order-rpc,cart-rpc,pay-rpc,reply-rpc,search-rpc,api-gateway"
    ports:
      - "36789:36789"
      - "36790:36790"
    depends_on:
      mysql:
        condition: service_healthy
      etcd:
        condition: service_healthy
    networks:
      - shop-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: shop-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.autoconfiguration.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      all_proxy: ""
      NO_PROXY: "localhost,127.0.0.1,mysql,redis,etcd,rabbitmq,dtm,jaeger,prometheus,grafana,elasticsearch,user-rpc,product-rpc,order-rpc,cart-rpc,pay-rpc,reply-rpc,search-rpc,api-gateway"
      no_proxy: "localhost,127.0.0.1,mysql,redis,etcd,rabbitmq,dtm,jaeger,prometheus,grafana,elasticsearch,user-rpc,product-rpc,order-rpc,cart-rpc,pay-rpc,reply-rpc,search-rpc,api-gateway"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - shop-network

  # ==================== RPC 服务 ====================
  user-rpc:
    build:
      context: .
      dockerfile: Dockerfile/Dockerfile.user
    container_name: shop-user-rpc
    restart: unless-stopped
    ports:
      - "9000:8080"
    environment:
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - ETCD_HOST=etcd
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - ALL_PROXY=
      - http_proxy=
      - https_proxy=
      - all_proxy=
      - NO_PROXY=localhost,127.0.0.1,mysql,redis,etcd,rabbitmq,jaeger,prometheus,grafana,user-rpc,product-rpc,order-rpc,cart-rpc,pay-rpc,reply-rpc,search-rpc,api-gateway
      - no_proxy=localhost,127.0.0.1,mysql,redis,etcd,rabbitmq,jaeger,prometheus,grafana,user-rpc,product-rpc,order-rpc,cart-rpc,pay-rpc,reply-rpc,search-rpc,api-gateway
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      etcd:
        condition: service_healthy
    networks:
      - shop-network

  product-rpc:
    build:
      context: .
      dockerfile: Dockerfile/Dockerfile.product
    container_name: shop-product-rpc
    restart: unless-stopped
    ports:
      - "9001:8081"
    environment:
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - ETCD_HOST=etcd
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - ALL_PROXY=
      - http_proxy=
      - https_proxy=
      - all_proxy=
      - NO_PROXY=localhost,127.0.0.1,mysql,redis,etcd,rabbitmq,jaeger,prometheus,grafana,user-rpc,product-rpc,order-rpc,cart-rpc,pay-rpc,reply-rpc,search-rpc,api-gateway
      - no_proxy=localhost,127.0.0.1,mysql,redis,etcd,rabbitmq,jaeger,prometheus,grafana,user-rpc,product-rpc,order-rpc,cart-rpc,pay-rpc,reply-rpc,search-rpc,api-gateway
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      etcd:
        condition: service_healthy
    networks:
      - shop-network

  order-rpc:
    build:
      context: .
      dockerfile: Dockerfile/Dockerfile.order
    container_name: shop-order-rpc
    restart: unless-stopped
    ports:
      - "9002:8082"
    environment:
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - ETCD_HOST=etcd
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - ALL_PROXY=
      - http_proxy=
      - https_proxy=
      - all_proxy=
      - NO_PROXY=localhost,127.0.0.1,mysql,redis,etcd,rabbitmq,jaeger,prometheus,grafana,user-rpc,product-rpc,order-rpc,cart-rpc,pay-rpc,reply-rpc,search-rpc,api-gateway
      - no_proxy=localhost,127.0.0.1,mysql,redis,etcd,rabbitmq,jaeger,prometheus,grafana,user-rpc,product-rpc,order-rpc,cart-rpc,pay-rpc,reply-rpc,search-rpc,api-gateway
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      etcd:
        condition: service_healthy
      user-rpc:
        condition: service_started
      product-rpc:
        condition: service_started
    networks:
      - shop-network

  seckill-rpc:
    build:
      context: .
      dockerfile: Dockerfile/Dockerfile.seckill
    container_name: shop-seckill-rpc
    profiles: ["experimental"]
    restart: unless-stopped
    ports:
      - "9003:9889"
    environment:
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - ETCD_HOST=etcd
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      etcd:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - shop-network

  cart-rpc:
    build:
      context: .
      dockerfile: Dockerfile/Dockerfile.cart
    container_name: shop-cart-rpc
    restart: unless-stopped
    ports:
      - "9004:8084"
    environment:
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - ETCD_HOST=etcd
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - ALL_PROXY=
      - http_proxy=
      - https_proxy=
      - all_proxy=
      - NO_PROXY=localhost,127.0.0.1,mysql,redis,etcd,rabbitmq,jaeger,prometheus,grafana,user-rpc,product-rpc,order-rpc,cart-rpc,pay-rpc,reply-rpc,search-rpc,api-gateway
      - no_proxy=localhost,127.0.0.1,mysql,redis,etcd,rabbitmq,jaeger,prometheus,grafana,user-rpc,product-rpc,order-rpc,cart-rpc,pay-rpc,reply-rpc,search-rpc,api-gateway
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      etcd:
        condition: service_healthy
    networks:
      - shop-network

  pay-rpc:
    build:
      context: .
      dockerfile: Dockerfile/Dockerfile.pay
    container_name: shop-pay-rpc
    restart: unless-stopped
    ports:
      - "9005:8085"
    environment:
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - ETCD_HOST=etcd
      - RABBITMQ_HOST=rabbitmq
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - ALL_PROXY=
      - http_proxy=
      - https_proxy=
      - all_proxy=
      - NO_PROXY=localhost,127.0.0.1,mysql,redis,etcd,rabbitmq,jaeger,prometheus,grafana,user-rpc,product-rpc,order-rpc,cart-rpc,pay-rpc,reply-rpc,search-rpc,api-gateway
      - no_proxy=localhost,127.0.0.1,mysql,redis,etcd,rabbitmq,jaeger,prometheus,grafana,user-rpc,product-rpc,order-rpc,cart-rpc,pay-rpc,reply-rpc,search-rpc,api-gateway
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      etcd:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - shop-network

  search-rpc:
    build:
      context: .
      dockerfile: Dockerfile/Dockerfile.search
    container_name: shop-search-rpc
    profiles: ["optional"]
    restart: unless-stopped
    ports:
      - "9006:8083"
    environment:
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - ETCD_HOST=etcd
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - ALL_PROXY=
      - http_proxy=
      - https_proxy=
      - all_proxy=
      - NO_PROXY=localhost,127.0.0.1,mysql,redis,etcd,rabbitmq,jaeger,prometheus,grafana,user-rpc,product-rpc,order-rpc,cart-rpc,pay-rpc,reply-rpc,search-rpc,api-gateway
      - no_proxy=localhost,127.0.0.1,mysql,redis,etcd,rabbitmq,jaeger,prometheus,grafana,user-rpc,product-rpc,order-rpc,cart-rpc,pay-rpc,reply-rpc,search-rpc,api-gateway
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      etcd:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    networks:
      - shop-network

  recommend-rpc:
    build:
      context: .
      dockerfile: Dockerfile/Dockerfile.recommend
    container_name: shop-recommend-rpc
    profiles: ["experimental"]
    restart: unless-stopped
    ports:
      - "9007:9007"
    environment:
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - ETCD_HOST=etcd
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      etcd:
        condition: service_healthy
    networks:
      - shop-network

  reply-rpc:
    build:
      context: .
      dockerfile: Dockerfile/Dockerfile.reply
    container_name: shop-reply-rpc
    restart: unless-stopped
    ports:
      - "9008:8086"
    environment:
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - ETCD_HOST=etcd
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - ALL_PROXY=
      - http_proxy=
      - https_proxy=
      - all_proxy=
      - NO_PROXY=localhost,127.0.0.1,mysql,redis,etcd,rabbitmq,jaeger,prometheus,grafana,user-rpc,product-rpc,order-rpc,cart-rpc,pay-rpc,reply-rpc,search-rpc,api-gateway
      - no_proxy=localhost,127.0.0.1,mysql,redis,etcd,rabbitmq,jaeger,prometheus,grafana,user-rpc,product-rpc,order-rpc,cart-rpc,pay-rpc,reply-rpc,search-rpc,api-gateway
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      etcd:
        condition: service_healthy
    networks:
      - shop-network

  # ==================== API Gateway ====================
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile/Dockerfile.api
    container_name: shop-api-gateway
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      - USER_RPC_HOST=user-rpc
      - PRODUCT_RPC_HOST=product-rpc
      - ORDER_RPC_HOST=order-rpc
      - SECKILL_RPC_HOST=seckill-rpc
      - CART_RPC_HOST=cart-rpc
      - PAY_RPC_HOST=pay-rpc
      - SEARCH_RPC_HOST=search-rpc
      - RECOMMEND_RPC_HOST=recommend-rpc
      - REPLY_RPC_HOST=reply-rpc
      - ETCD_HOST=etcd
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - ALL_PROXY=
      - http_proxy=
      - https_proxy=
      - all_proxy=
      - NO_PROXY=localhost,127.0.0.1,mysql,redis,etcd,rabbitmq,jaeger,prometheus,grafana,user-rpc,product-rpc,order-rpc,cart-rpc,pay-rpc,reply-rpc,search-rpc,api-gateway
      - no_proxy=localhost,127.0.0.1,mysql,redis,etcd,rabbitmq,jaeger,prometheus,grafana,user-rpc,product-rpc,order-rpc,cart-rpc,pay-rpc,reply-rpc,search-rpc,api-gateway
    depends_on:
      - user-rpc
      - product-rpc
      - order-rpc
      - dtm
    networks:
      - shop-network

  # ==================== 消息队列消费者 ====================
  seckill-rmq:
    build:
      context: .
      dockerfile: Dockerfile/Dockerfile.seckill.rmq
    container_name: shop-seckill-rmq
    profiles: ["experimental"]
    restart: unless-stopped
    environment:
      - RABBITMQ_HOST=rabbitmq
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shop-network

  order-rmq:
    build:
      context: .
      dockerfile: Dockerfile/Dockerfile.order.rmq
    container_name: shop-order-rmq
    profiles: ["experimental"]
    restart: unless-stopped
    environment:
      - RABBITMQ_HOST=rabbitmq
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shop-network

  pay-rmq:
    build:
      context: .
      dockerfile: Dockerfile/Dockerfile.pay.rmq
    container_name: shop-pay-rmq
    profiles: ["experimental"]
    restart: unless-stopped
    environment:
      - RABBITMQ_HOST=rabbitmq
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shop-network

  reply-rmq:
    build:
      context: .
      dockerfile: Dockerfile/Dockerfile.reply.rmq
    container_name: shop-reply-rmq
    profiles: ["experimental"]
    restart: unless-stopped
    environment:
      - RABBITMQ_HOST=rabbitmq
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shop-network

  # ==================== 可观测性 ====================
  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    container_name: shop-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"  # UI
      - "14268:14268"  # Collector
      - "6831:6831/udp"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - shop-network

  prometheus:
    image: prom/prometheus:v3
    container_name: shop-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - shop-network

  grafana:
    image: grafana/grafana:12.3.5
    container_name: shop-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123456
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - shop-network

networks:
  shop-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  etcd_data:
  rabbitmq_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data:
      
